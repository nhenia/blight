<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninth Ward Canvas - Tactical Mapping Tool</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0b">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0b0b0b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .popup-content {
            font-size: 14px;
            color: #333;
        }
        .popup-content h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
        }
        .popup-content p {
            margin: 4px 0;
        }
        .gps-toggle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: #222;
            color: #eee;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gps-toggle.active {
            background: #007bff;
            border-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="gps-toggle" class="gps-toggle">GPS: OFF</button>

    <script>
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([29.965, -90.007], 15);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        const API_ENDPOINT = 'https://data.nola.gov/resource/gjzc-adg8.json';
        // Spec says: neighborhood='LOWER NINTH WARD' AND status IN('Guilty', 'Uncommitted')
        // Using available fields as proxy based on exploration
        const SOQL_QUERY = `?$where=within_box(the_geom, 29.95, -90.03, 29.98, -89.98)`;

        async function fetchProperties() {
            try {
                const response = await fetch(API_ENDPOINT + SOQL_QUERY);
                const data = await response.json();
                processProperties(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function processProperties(data) {
            data.forEach(prop => {
                if (!prop.the_geom || !prop.the_geom.coordinates) return;

                const lat = prop.the_geom.coordinates[1];
                const lng = prop.the_geom.coordinates[0];

                // Adapt status and dates
                let status = 'Uncommitted';
                if (prop.prevhearingresult === 'Guilty' || (prop.keystatus && prop.keystatus.includes('Guilty'))) {
                    status = 'Guilty';
                }

                const noticeDateStr = prop.statdate || prop.casefiled;
                const noticeDate = new Date(noticeDateStr);
                const deadlineDate = new Date(noticeDate);
                deadlineDate.setDate(deadlineDate.getDate() + 30);

                const formattedNoticeDate = noticeDate.toLocaleDateString();
                const formattedDeadline = deadlineDate.toLocaleDateString();

                addMarker(lat, lng, {
                    address: prop.geoaddress || prop.location || 'Unknown Address',
                    status: status,
                    noticeDate: formattedNoticeDate,
                    deadline: formattedDeadline
                });
            });
        }

        function addMarker(lat, lng, property) {
            const color = property.status === 'Guilty' ? '#ff0000' : '#ffa500';

            const marker = L.circleMarker([lat, lng], {
                radius: 8,
                fillColor: color,
                color: '#fff',
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            const popupContent = `
                <div class="popup-content">
                  <h3>${property.address}</h3>
                  <p><b>Status:</b> ${property.status}</p>
                  <p><b>Notice Date:</b> ${property.noticeDate}</p>
                  <p><b>30-Day Deadline:</b> ${property.deadline}</p>
                </div>
            `;

            marker.bindPopup(popupContent);
        }

        // Tactical Controls: Follow GPS Toggle
        const gpsToggle = document.getElementById('gps-toggle');
        let watchId = null;
        let userMarker = null;

        gpsToggle.addEventListener('click', () => {
            if (watchId === null) {
                // Opt-in: Start tracking
                if ("geolocation" in navigator) {
                    gpsToggle.textContent = 'GPS: ON';
                    gpsToggle.classList.add('active');
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            if (userMarker) {
                                userMarker.setLatLng([latitude, longitude]);
                            } else {
                                userMarker = L.circleMarker([latitude, longitude], {
                                    radius: 10,
                                    fillColor: '#007bff',
                                    color: '#fff',
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.9
                                }).addTo(map);
                            }
                            map.setView([latitude, longitude]);
                        },
                        (error) => {
                            console.error('GPS error:', error);
                            stopGps();
                            alert('Unable to retrieve your location.');
                        },
                        { enableHighAccuracy: true }
                    );
                } else {
                    alert('Geolocation is not supported by your browser.');
                }
            } else {
                // Stop tracking
                stopGps();
            }
        });

        function stopGps() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            gpsToggle.textContent = 'GPS: OFF';
            gpsToggle.classList.remove('active');
            if (userMarker) {
                map.removeLayer(userMarker);
                userMarker = null;
            }
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.error('ServiceWorker registration failed: ', err);
                });
            });
        }

        fetchProperties();
    </script>
</body>
</html>
