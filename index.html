<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninth Ward Canvas - Tactical Mapping Tool</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0b">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0b0b0b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .popup-content {
            font-size: 14px;
            color: #333;
        }
        .popup-content h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
        }
        .popup-content p {
            margin: 4px 0;
        }
        .gps-toggle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: #222;
            color: #eee;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Touch target accessibility for Leaflet controls */
        .leaflet-bar a {
            width: 44px !important;
            height: 44px !important;
            line-height: 44px !important;
            font-size: 22px !important;
        }
        .gps-toggle.active {
            background: #007bff;
            border-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="gps-toggle" class="gps-toggle">Follow GPS</button>

    <script>
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([29.965, -90.007], 15);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        const API_ENDPOINT = 'https://data.nola.gov/resource/gjzc-adg8.json';
        // Technical Spec aliases and filters (neighborhood column is missing, using spatial proxy)
        const SOQL_QUERY = `?$select=geoaddress AS address, prevhearingresult AS status, casefiled AS notice_date, the_geom AS location, caseno AS casenumber` +
                           `&$where=within_box(the_geom, 29.95, -90.03, 29.98, -89.98)`;

        function parseSocrataDate(dateStr) {
            if (!dateStr || typeof dateStr !== 'string') return new Date();
            // Handle compact Socrata format: YYYYMMDDHHMMSS.sss
            if (dateStr.length >= 8 && !dateStr.includes('-') && !dateStr.includes(':')) {
                const y = parseInt(dateStr.substring(0, 4));
                const m = parseInt(dateStr.substring(4, 6)) - 1;
                const d = parseInt(dateStr.substring(6, 8));
                const hh = parseInt(dateStr.substring(8, 10)) || 0;
                const mm = parseInt(dateStr.substring(10, 12)) || 0;
                const ss = parseInt(dateStr.substring(12, 14)) || 0;
                return new Date(y, m, d, hh, mm, ss);
            }
            // Fallback to native Date for ISO strings or other formats
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? new Date() : d;
        }

        async function fetchProperties() {
            try {
                const response = await fetch(API_ENDPOINT + SOQL_QUERY);
                const data = await response.json();
                processProperties(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function processProperties(data) {
            data.forEach(prop => {
                // Skip Logic: If missing location, do not map it.
                if (!prop.location || !prop.location.coordinates) return;

                const lat = prop.location.coordinates[1];
                const lng = prop.location.coordinates[0];

                // Status mapping (default to Uncommitted if not explicitly Guilty)
                let status = 'Uncommitted';
                if (prop.status && prop.status.startsWith('Guilty')) {
                    status = 'Guilty';
                }

                // Deadline Calculation: notice_date + 30 days
                const noticeDate = parseSocrataDate(prop.notice_date);
                const deadlineDate = new Date(noticeDate);
                deadlineDate.setDate(deadlineDate.getDate() + 30);

                const formattedNoticeDate = noticeDate.toLocaleDateString();
                const formattedDeadline = deadlineDate.toLocaleDateString();

                addMarker(lat, lng, {
                    address: prop.address || 'Unknown Address',
                    status: status,
                    noticeDate: formattedNoticeDate,
                    deadline: formattedDeadline
                });
            });
        }

        function addMarker(lat, lng, property) {
            // Guilty = Red, Uncommitted = Amber/Orange
            const color = property.status === 'Guilty' ? '#ff0000' : '#FFBF00';

            const marker = L.circleMarker([lat, lng], {
                radius: 8,
                fillColor: color,
                color: '#fff',
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            // Technical Spec: Must use this exact HTML structure
            const popupContent = `
<div class="popup-content">
  <h3>${property.address}</h3>
  <p><b>Status:</b> ${property.status}</p>
  <p><b>Notice Date:</b> ${property.noticeDate}</p>
  <p><b>30-Day Deadline:</b> ${property.deadline}</p>
</div>
            `.trim();

            marker.bindPopup(popupContent);
        }

        // Tactical Controls: Follow GPS Toggle
        const gpsToggle = document.getElementById('gps-toggle');
        let watchId = null;
        let userMarker = null;
        let followUser = true;

        map.on('dragstart', () => {
            if (watchId !== null) followUser = false;
        });

        gpsToggle.addEventListener('click', () => {
            if (watchId === null) {
                // Opt-in: Start tracking
                if ("geolocation" in navigator) {
                    gpsToggle.classList.add('active');
                    followUser = true;
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            if (userMarker) {
                                userMarker.setLatLng([latitude, longitude]);
                            } else {
                                userMarker = L.circleMarker([latitude, longitude], {
                                    radius: 10,
                                    fillColor: '#007bff',
                                    color: '#fff',
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.9
                                }).addTo(map);
                            }
                            if (followUser) {
                                map.setView([latitude, longitude]);
                            }
                        },
                        (error) => {
                            console.error('GPS error:', error);
                            stopGps();
                            alert('Unable to retrieve your location.');
                        },
                        { enableHighAccuracy: true }
                    );
                } else {
                    alert('Geolocation is not supported by your browser.');
                }
            } else {
                // Stop tracking
                stopGps();
            }
        });

        function stopGps() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            gpsToggle.classList.remove('active');
            if (userMarker) {
                map.removeLayer(userMarker);
                userMarker = null;
            }
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.error('ServiceWorker registration failed: ', err);
                });
            });
        }

        fetchProperties();
    </script>
</body>
</html>
